name: CI

on:
  pull_request:
    branches: [ "**" ]

env:
  AWS_REGION: us-east-1                        # ← change to your region
  JAVA_VERSION: '25'
  ECR_REPOSITORY: health-app              # ← your actual ECR repo name
  EKS_CLUSTER_NAME: eks-health-app # ← your actual cluster name
  DEPLOYMENT_NAME: health-app

jobs:
  # ──────────────────────────────────────────
  # 1 & 2. Dependencies + Unit Tests
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven                          # caches ~/.m2 between runs

      - name: Run unit tests with coverage
        run: mvn clean verify -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: target/site/jacoco/

  # ──────────────────────────────────────────
  # 3. Integration Tests
  # ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests
        run: mvn verify -P integration-tests -Dsurefire.failIfNoSpecifiedTests=false

  # ──────────────────────────────────────────
  # 4. SAST – SonarQube
  # ──────────────────────────────────────────
#  sonarqube:
#    name: SonarQube SAST Scan
#    runs-on: ubuntu-latest
#    needs: unit-tests
#    steps:
#      - uses: actions/checkout@v5
#        with:
#          fetch-depth: 0                        # full history required by Sonar
#
#      - uses: actions/setup-java@v5
#        with:
#          distribution: temurin
#          java-version: ${{ env.JAVA_VERSION }}
#          cache: maven
#
#      - name: SonarQube scan
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
#        run: |
#          mvn verify sonar:sonar \
#            -Dsonar.projectKey=your-project-key \
#            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
#            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────
  # 5. Build Docker Image
  # ──────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [integration-tests]
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: meta
        run: echo "image-tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -t ${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Save image as tarball
        run: docker save ${{ env.ECR_REPOSITORY }}:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v5
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ──────────────────────────────────────────
  # 6. Container Security Scan (Trivy + Snyk)
  # ──────────────────────────────────────────
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v5

      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 1                          # fail on HIGH/CRITICAL
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore


  # ──────────────────────────────────────────
  # 7. Push to Amazon ECR
  # ──────────────────────────────────────────
  push-to-ecr:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: container-security
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest