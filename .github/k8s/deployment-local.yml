apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-app
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: health-app
  template:
    metadata:
      labels:
        app: health-app
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: health-app
          envFrom:
            - secretRef:
                name: db-secret
          image: 348263686377.dkr.ecr.us-east-1.amazonaws.com/health-app:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: health-app-service
  namespace: prod
spec:
  type: LoadBalancer
  selector:
    app: health-app
  ports:
    - port: 80
      targetPort: 8080